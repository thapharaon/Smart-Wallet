<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Chi tiêu Cá nhân Offline</title>
    <!-- Nhúng thư viện Tailwind CSS để giao diện đẹp luôn không cần cài đặt -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Nhúng thư viện Chart.js để vẽ biểu đồ hình tròn -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Nhúng FontAwesome để làm icon cho đẹp -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-800">

    <div class="max-w-5xl mx-auto p-4 md:p-6">
        <!-- TIÊU ĐỀ ỨNG DỤNG -->
        <header class="bg-gradient-to-r from-teal-600 to-emerald-600 text-white rounded-2xl p-6 shadow-md mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold"><i class="fa-solid fa-wallet mr-2"></i>Ví Thông Minh</h1>
                <p class="text-sm text-teal-100 mt-1">Quản lý tài chính cá nhân offline an toàn tuyệt đối</p>
            </div>
            <div class="text-right">
                <span class="text-xs bg-teal-700 px-3 py-1.5 rounded-full font-medium border border-teal-500/30">
                    <i class="fa-solid fa-shield-halved mr-1"></i> Trình duyệt Offline
                </span>
            </div>
        </header>

        <!-- KHU VỰC THỐNG KÊ TỔNG QUAN -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Tổng Thu Nhập</p>
                    <h3 id="total-income" class="text-xl font-bold text-emerald-600 mt-1">0đ</h3>
                </div>
                <div class="w-12 h-12 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-600 text-xl">
                    <i class="fa-solid fa-arrow-trend-up"></i>
                </div>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Tổng Chi Tiêu</p>
                    <h3 id="total-expense" class="text-xl font-bold text-rose-600 mt-1">0đ</h3>
                </div>
                <div class="w-12 h-12 rounded-xl bg-rose-50 flex items-center justify-center text-rose-600 text-xl">
                    <i class="fa-solid fa-arrow-trend-down"></i>
                </div>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Số Dư Còn Lại</p>
                    <h3 id="total-balance" class="text-xl font-bold text-teal-600 mt-1">0đ</h3>
                </div>
                <div class="w-12 h-12 rounded-xl bg-teal-50 flex items-center justify-center text-teal-600 text-xl">
                    <i class="fa-solid fa-scale-balanced"></i>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- CỘT TRÁI: FORM NHẬP GIAO DỊCH -->
            <div class="lg:col-span-5 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 h-fit">
                <h2 class="text-lg font-bold mb-4 flex items-center text-slate-700">
                    <i class="fa-solid fa-pen-to-square text-teal-600 mr-2"></i>Thêm Giao Dịch Mới
                </h2>
                
                <!-- Nút chuyển đổi THU / CHI -->
                <div class="flex bg-slate-100 p-1 rounded-xl mb-5">
                    <button id="btn-expense-tab" onclick="setTransactionType('chi')" class="w-1/2 py-2.5 rounded-lg text-sm font-bold bg-white text-rose-600 shadow-sm transition-all">
                        <i class="fa-solid fa-minus mr-1"></i> Tiền Chi
                    </button>
                    <button id="btn-income-tab" onclick="setTransactionType('thu')" class="w-1/2 py-2.5 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-700 transition-all">
                        <i class="fa-solid fa-plus mr-1"></i> Tiền Thu
                    </button>
                </div>

                <!-- Form thông tin nhập -->
                <form id="transaction-form" onsubmit="saveTransaction(event)" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Ngày tháng</label>
                        <input type="date" id="tx-date" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-teal-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Số tiền (đđ)</label>
                        <input type="number" id="tx-amount" min="1" required placeholder="Ví dụ: 50000" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-teal-500 font-semibold text-slate-700">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Danh mục</label>
                        <select id="tx-category" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-teal-500 text-slate-600"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Ghi chú / Lý do</label>
                        <input type="text" id="tx-note" placeholder="Ví dụ: Ăn trưa bún chả" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-teal-500">
                    </div>
                    <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-xl transition-all shadow-sm shadow-teal-600/10 cursor-pointer">
                        <i class="fa-solid fa-check mr-1"></i> Lưu Giao Dịch
                    </button>
                </form>
            </div>

            <!-- CỘT PHẢI: LỊCH SỬ & BIỂU ĐỒ -->
            <div class="lg:col-span-7 space-y-6">
                <!-- BÁO CÁO BIỂU ĐỒ TRÒN -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center">
                    <h2 class="text-lg font-bold mb-4 self-start flex items-center text-slate-700">
                        <i class="fa-solid fa-chart-pie text-teal-600 mr-2"></i>Tỷ Lệ Chi Tiêu Tháng Này
                    </h2>
                    <div class="w-64 h-64 flex items-center justify-center">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>

                <!-- DANH SÁCH LỊCH SỬ GIAO DỊCH -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mb-4">
                        <h2 class="text-lg font-bold flex items-center text-slate-700">
                            <i class="fa-solid fa-clock-rotate-left text-teal-600 mr-2"></i>Lịch Sử Giao Dịch
                        </h2>
                        <!-- Thanh tìm kiếm nhanh -->
                        <div class="relative w-full sm:w-48">
                            <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400 text-xs"></i>
                            <input type="text" id="search-input" oninput="render()" placeholder="Tìm kiếm ghi chú..." class="w-full bg-slate-50 border border-slate-200 rounded-lg pl-8 pr-3 py-1.5 text-xs focus:outline-none focus:border-teal-500">
                        </div>
                    </div>

                    <!-- Bảng chứa danh sách -->
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="text-xs font-bold uppercase text-slate-400 border-b border-slate-100">
                                    <th class="py-2.5">Ngày</th>
                                    <th class="py-2.5">Danh mục / Ghi chú</th>
                                    <th class="py-2.5 text-right">Số tiền</th>
                                    <th class="py-2.5 text-center">Xóa</th>
                                </tr>
                            </thead>
                            <tbody id="transaction-list" class="divide-y divide-slate-50 font-medium text-slate-600">
                                <!-- Dữ liệu JavaScript tự chèn vào đây -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- LOGIC JAVASCRIPT XỬ LÝ OFFLINE -->
    <script>
        // Khởi tạo các danh mục mặc định cho Thu và Chi
        const categories = {
            chi: ['Ăn uống', 'Mua sắm', 'Tiền điện/nước', 'Di chuyển', 'Mỹ phẩm', 'Chi phí khác'],
            thu: ['Tiền lương', 'Tiền thưởng', 'Phụ cấp', 'Được tặng', 'Khoản thu khác']
        };

        let currentType = 'chi'; // Mặc định trạng thái form là Chi tiêu
        // Lấy dữ liệu cũ từ localStorage, nếu chưa có thì khởi tạo mảng rỗng []
        let transactions = JSON.parse(localStorage.getItem('transactions_data')) || [];
        let myChart = null; // Biến lưu trữ biểu đồ hình tròn

        // Hàm đặt ngày hôm nay làm mặc định cho ô chọn ngày
        document.getElementById('tx-date').valueAsDate = new Date();

        // Hàm chuyển đổi tab giữa Tiền Thu và Tiền Chi trên form
        function setTransactionType(type) {
            currentType = type;
            const btnExpense = document.getElementById('btn-expense-tab');
            const btnIncome = document.getElementById('btn-income-tab');

            if (type === 'chi') {
                btnExpense.className = "w-1/2 py-2.5 rounded-lg text-sm font-bold bg-white text-rose-600 shadow-sm transition-all";
                btnIncome.className = "w-1/2 py-2.5 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-700 transition-all";
            } else {
                btnIncome.className = "w-1/2 py-2.5 rounded-lg text-sm font-bold bg-white text-emerald-600 shadow-sm transition-all";
                btnExpense.className = "w-1/2 py-2.5 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-700 transition-all";
            }
            updateCategorySelect();
        }

        // Hàm cập nhật danh sách chọn danh mục tương ứng theo Thu hoặc Chi
        function updateCategorySelect() {
            const select = document.getElementById('tx-category');
            select.innerHTML = '';
            categories[currentType].forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = cat;
                select.appendChild(opt);
            });
        }

        // Hàm lưu giao dịch mới vào mảng và đẩy vào LocalStorage
        function saveTransaction(e) {
            e.preventDefault();
            const amount = parseInt(document.getElementById('tx-amount').value);
            const date = document.getElementById('tx-date').value;
            const category = document.getElementById('tx-category').value;
            const note = document.getElementById('tx-note').value.trim();

            const newTx = {
                id: Date.now(), // Dùng timestamp làm id duy nhất
                type: currentType,
                amount,
                date,
                category,
                note: note || category // Nếu không ghi chú thì lấy tên danh mục làm ghi chú
            };

            transactions.unshift(newTx); // Đưa giao dịch mới lên đầu mảng
            localStorage.setItem('transactions_data', JSON.stringify(transactions)); // Lưu offline vĩnh viễn vào máy
            
            // Reset lại form nhập liệu
            document.getElementById('tx-amount').value = '';
            document.getElementById('tx-note').value = '';
            document.getElementById('tx-date').valueAsDate = new Date();

            render(); // Cập nhật hiển thị và biểu đồ ngay tức thì
        }

        // Hàm xóa giao dịch theo ID
        function deleteTransaction(id) {
            if(confirm('Bạn có chắc chắn muốn xóa giao dịch này không?')) {
                transactions = transactions.filter(tx => tx.id !== id);
                localStorage.setItem('transactions_data', JSON.stringify(transactions));
                render();
            }
        }

        // Hàm tính toán tiền nong, hiển thị danh sách và vẽ biểu đồ hình tròn
        function render() {
            let totalIncome = 0;
            let totalExpense = 0;
            const searchTerm = document.getElementById('search-input').value.toLowerCase();

            // Object gom nhóm số tiền chi tiêu theo từng danh mục để vẽ biểu đồ tròn
            const chartDataObj = {};
            categories.chi.forEach(cat => chartDataObj[cat] = 0);

            const listBody = document.getElementById('transaction-list');
            listBody.innerHTML = '';

            transactions.forEach(tx => {
                // Tính toán tổng tiền dựa trên loại giao dịch
                if (tx.type === 'thu') totalIncome += tx.amount;
                if (tx.type === 'chi') {
                    totalExpense += tx.amount;
                    if (chartDataObj[tx.category] !== undefined) {
                        chartDataObj[tx.category] += tx.amount;
                    }
                }

                // Lọc tìm kiếm theo từ khóa ghi chú
                if (tx.note.toLowerCase().includes(searchTerm) || tx.category.toLowerCase().includes(searchTerm)) {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-50 transition-colors";
                    
                    // Định dạng hiển thị ngày DD/MM
                    const dateParts = tx.date.split('-');
                    const formattedDate = dateParts.length === 3 ? `${dateParts[2]}/${dateParts[1]}` : tx.date;

                    row.innerHTML = `
                        <td class="py-3 text-xs text-slate-400 font-normal">${formattedDate}</td>
                        <td class="py-3">
                            <span class="block font-bold text-slate-700">${tx.category}</span>
                            <span class="block text-xs text-slate-400 font-normal">${tx.note}</span>
                        </td>
                        <td class="py-3 text-right font-bold ${tx.type === 'thu' ? 'text-emerald-600' : 'text-slate-700'}">
                            ${tx.type === 'thu' ? '+' : '-'}${tx.amount.toLocaleString('vi-VN')}đ
                        </td>
                        <td class="py-3 text-center">
                            <button onclick="deleteTransaction(${tx.id})" class="text-slate-300 hover:text-rose-600 transition-colors p-1 cursor-pointer">
                                <i class="fa-regular fa-trash-can"></i>
                            </button>
                        </td>
                    `;
                    listBody.appendChild(row);
                }
            });

            // Cập nhật các ô hiển thị tiền mặt đầu trang
            document.getElementById('total-income').innerText = totalIncome.toLocaleString('vi-VN') + 'đ';
            document.getElementById('total-expense').innerText = totalExpense.toLocaleString('vi-VN') + 'đ';
            const balance = totalIncome - totalExpense;
            const balanceEl = document.getElementById('total-balance');
            balanceEl.innerText = balance.toLocaleString('vi-VN') + 'đ';
            balanceEl.className = `text-xl font-bold mt-1 ${balance >= 0 ? 'text-teal-600' : 'text-rose-600'}`;

            // --- XỬ LÝ VẼ BIỂU ĐỒ HÌNH TRÒN (CHART.JS) ---
            const labels = Object.keys(chartDataObj);
            const dataValues = Object.values(chartDataObj);
            const hasData = dataValues.some(v => v > 0);

            if(myChart) myChart.destroy(); // Hủy biểu đồ cũ nếu có để vẽ cái mới

            const ctx = document.getElementById('expenseChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut', // Dạng biểu đồ hình tròn khuyết giữa (donut) nhìn hiện đại
                data: {
                    labels: hasData ? labels : ['Chưa có dữ liệu chi tiêu'],
                    datasets: [{
                        data: hasData ? dataValues : [1],
                        backgroundColor: hasData ? 
                            ['#0d9488', '#e11d48', '#ea580c', '#2563eb', '#db2777', '#64748b'] : 
                            ['#e2e8f0'] // Đổi sang màu xám nếu chưa có tiền tiêu
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11, weight: 'bold' } } }
                    }
                }
            });
        }

        // Chạy khởi tạo ứng dụng lần đầu khi vừa tải trang
        updateCategorySelect();
        render();
    </script>
</body>
</html>
